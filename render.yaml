services:
  - type: web
    name: budgetdesk-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: ALLOWED_HOSTS
        value: your-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-frontend.onrender.com
      - key: JWT_COOKIE_SECURE
        value: "True"
      - key: JWT_COOKIE_SAMESITE
        value: None
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: DB_NAME
        value: neon_database_name
      - key: DB_USER
        value: neon_user
      - key: DB_PASSWORD
        value: neon_password
      - key: DB_HOST
        value: your-neon-host.neon.tech
      - key: DB_PORT
        value: "5432"

  - type: static
    name: budgetdesk-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://your-backend.onrender.com/api/v1
